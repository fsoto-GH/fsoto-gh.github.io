    <style>
        /* ── Back to top ─────────────────────────────────────────────────────────── */
        #back-to-top {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: #202020;
            border: 1px solid #303030;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555555;
            font-size: 14px;
            text-decoration: none;
            cursor: pointer;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s, border-color 0.15s, color 0.15s, background-color 0.15s;
            z-index: 199;
        }

        .fancybox__container {
            z-index: 10003 !important;
            /* Navbar is 10001, so this ensures the lightbox appears above it */
        }

        #back-to-top.visible {
            opacity: 1;
            pointer-events: auto;
        }

        #back-to-top:hover {
            border-color: #505050;
            color: #ffffff;
            background-color: #2a2a2a;
        }
    </style>

<body>
    <div id="root"></div>
    <a id="back-to-top" href="#" aria-label="Back to top" title="Back to top">&#8593;</a>
    <script>
        var btt = document.getElementById("back-to-top");
        var threshold = 300;

        window.addEventListener(
            "scroll",
            function () {
                btt.classList.toggle("visible", window.scrollY > threshold);
            },
            { passive: true },
        );

        btt.addEventListener("click", function (e) {
            e.preventDefault();
            window.scrollTo({ top: 0, behavior: "smooth" });
        });

        document.querySelectorAll(".accomplishment").forEach((el, i) => {
            el.style.animation = `fadeUp 0.4s ${0.05 + i * 0.06}s ease both`;
        });
    </script>
